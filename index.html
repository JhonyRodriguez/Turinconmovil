<style>
    .hero {
        position: relative;
        padding: 180px 20px;
        text-align: center;
        /* Imagen de una carretera escénica en Tenerife con vistas al mar */
        background-image: url('https://images.unsplash.com/photo-1581442123075-846f48f4388e?q=80&w=2000&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }

    /* Overlay con degradado para un acabado más profesional */
    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(0deg, rgba(5, 8, 10, 0.9) 0%, rgba(5, 8, 10, 0.4) 100%);
        z-index: 1;
    }

    .hero h1 { 
        font-size: clamp(34px, 7vw, 60px); 
        margin-bottom: 20px; 
        text-shadow: 2px 2px 10px rgba(0,0,0,0.5); /* Sombra para resaltar sobre el fondo turístico */
    }

    .hero p { 
        color: #ffffff; 
        font-size: 22px; 
        max-width: 850px; 
        text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
    }
</style>

<section class="hero">
    <h1>Excelencia en Transporte Privado</h1>
    <p>Disfrute de los mejores paisajes de Tenerife mientras le llevamos a su destino con total comodidad.</p>
</section>
