<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tenerife Transfers Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #070707;
  color: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-weight: 700;
  color: #00c2ff;
}

/* HERO */
.hero {
  padding: 140px 20px;
  text-align: center;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1600&q=80')
    center/cover no-repeat;
}

.hero h1 {
  font-size: 48px;
  max-width: 900px;
  margin: auto;
}

.hero p {
  font-size: 18px;
  opacity: 0.85;
  margin-top: 10px;
}

.badge {
  margin-top: 20px;
  opacity: 0.9;
  font-size: 14px;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 40px;
  padding: 60px 40px;
  flex-wrap: wrap;
}

.left, .right {
  flex: 1;
  min-width: 320px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
}

/* FORM */
.form-group {
  margin-bottom: 12px;
}

label {
  font-size: 12px;
  opacity: 0.7;
  display: block;
  margin-bottom: 4px;
}

select, input {
  width: 100%;
  padding: 12px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  outline: none;
}

/* CTA */
.cta {
  background: linear-gradient(90deg, #00c2ff, #00ff9d);
  color: #000;
  padding: 14px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  border-radius: 8px;
  margin-top: 10px;
}

/* RESULTADO */
#precio {
  font-size: 22px;
  color: #00ff9d;
  margin-top: 10px;
  font-weight: 600;
  line-height: 1.5;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: #fff;
  padding: 16px;
  border-radius: 50%;
  font-size: 20px;
}
</style>

</head>

<body>

<header>
  <div class="logo">Tenerife Transfers</div>
  <div><i class="fa fa-phone"></i> +34 685 529 924</div>
</header>

<section class="hero">
  <h1>Transfers privados en Tenerife sin esperas</h1>
  <p>Servicio premium con cálculo automático de precio según distancia real</p>

  <div class="badge">
    ⭐ 4.9/5 valoraciones · 🚖 Base Santa Cruz · 📍 Precio dinámico por km
  </div>
</section>

<section class="container">

  <div class="left">

    <div class="card">
      <h2>Reserva rápida</h2>

      <div class="form-group">
        <label>Origen</label>
        <select id="origen">
          <option value="TFS">Aeropuerto Sur (TFS)</option>
          <option value="TFN">Aeropuerto Norte (TFN)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Destino</label>
        <select id="destino">
          <option value="">Selecciona destino</option>
          <option value="Costa Adeje">Costa Adeje</option>
          <option value="Playa de las Américas">Playa de las Américas</option>
          <option value="Los Cristianos">Los Cristianos</option>
          <option value="Puerto de la Cruz">Puerto de la Cruz</option>
          <option value="Santa Cruz">Santa Cruz</option>
        </select>
      </div>

      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fecha">
      </div>

      <button class="cta" onclick="calcular()">Calcular precio</button>

      <div id="precio"></div>

      <button class="cta" onclick="reservar()">Reservar por WhatsApp</button>

    </div>

  </div>

</section>

<a class="whatsapp" href="https://wa.me/34685529924" target="_blank">
  <i class="fa fa-whatsapp"></i>
</a>

<script>

/* TARIFA REALISTA */
const tarifaKm = 1.25;
const baseServicio = 8;

/* DISTANCIA DESDE BASE SANTA CRUZ */
const distanciaBase = {
  TFS: 60,
  TFN: 15
};

/* DISTANCIA A DESTINOS */
const destinosKm = {
  "Costa Adeje": 65,
  "Playa de las Américas": 60,
  "Los Cristianos": 55,
  "Puerto de la Cruz": 35,
  "Santa Cruz": 0
};

function calcular() {

  let origen = document.getElementById("origen").value;
  let destino = document.getElementById("destino").value;

  if (!destino) {
    document.getElementById("precio").innerHTML = "Selecciona destino";
    return;
  }

  let km = distanciaBase[origen] + destinosKm[destino];
  let precio = Math.round((km * tarifaKm) + baseServicio);

  document.getElementById("precio").innerHTML =
    "Distancia estimada: " + km + " km<br>" +
    "Precio final: " + precio + "€";

}

function reservar() {

  let origen = document.getElementById("origen").value;
  let destino = document.getElementById("destino").value;
  let fecha = document.getElementById("fecha").value;

  let km = distanciaBase[origen] + destinosKm[destino];
  let precio = Math.round((km * tarifaKm) + baseServicio);

  let mensaje = `Transfer Tenerife:
Origen: ${origen}
Destino: ${destino}
Fecha: ${fecha}
Distancia: ${km} km
Precio final: ${precio}€`;

  window.open("https://wa.me/34685529924?text=" + encodeURIComponent(mensaje), "_blank");
}

</script>

</body>
</html>
