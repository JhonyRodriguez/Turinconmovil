<style>
    .hero {
        position: relative;
        padding: 160px 20px; /* Un poco más de altura para un aire más premium */
        text-align: center;
        /* IMAGEN DE FONDO TURÍSTICA DE ALTA CALIDAD */
        background-image: url('https://images.unsplash.com/photo-1590711918454-04f86d634eb7?q=80&w=2000&auto=format&fit=crop');
        background-size: cover;
        background-position: center center; /* Centrar la imagen en el punto de interés */
        background-attachment: fixed; /* Mantiene el efecto parallax profesional */
        background-repeat: no-repeat;
    }

    /* EL ARREGLO: Capa oscura de degradado para legibilidad máxima */
    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Empieza un 60% oscuro y se aclara a un 30% en la parte superior */
        background: linear-gradient(0deg, rgba(5, 8, 10, 0.9) 0%, rgba(5, 8, 10, 0.5) 100%);
        z-index: 1;
    }

    /* Garantizar que el texto esté sobre la capa de degradado */
    .hero h1, .hero p {
        position: relative;
        z-index: 2;
    }

    .hero h1 { 
        font-size: clamp(32px, 6vw, 56px); /* Letra grande y escalable */
        margin-bottom: 20px; 
        font-weight: 700; 
        letter-spacing: -1.5px; 
        color: #ffffff; /* BLANCO PURO */
        text-shadow: 0 4px 10px rgba(0,0,0,0.5); /* Sombra para un extra de definición */
    }

    .hero p { 
        color: #e2e8f0; /* Un blanco roto elegante */
        font-size: 22px; 
        max-width: 800px; 
        margin: 0 auto; 
        font-weight: 300; 
        text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    /* Ajuste para móvil: desactivar parallax por rendimiento */
    @media (max-width: 768px) {
        .hero { background-attachment: scroll; padding: 120px 20px; }
    }
</style>

<section class="hero">
    <h1>Excelencia en Transporte Privado</h1>
    <p>Disfrute de los mejores paisajes de Tenerife mientras le llevamos a su destino con total comodidad.</p>
</section>
